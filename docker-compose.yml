version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    networks:
      - ecommerce-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "${USER_SERVICE_PORT}:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - ecommerce-network

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    ports:
      - "${CART_SERVICE_PORT}:8083"
    networks:
      - ecommerce-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "${ORDER_SERVICE_PORT}:8084"
    networks:
      - ecommerce-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "${PAYMENT_SERVICE_PORT}:8085"
    networks:
      - ecommerce-network

  ecommerce-ui:
    build:
      context: ./ecommerce-ui
      dockerfile: Dockerfile
      args:
        VITE_USER_SERVICE_URL: http://${EC2_PUBLIC_IP}:${USER_SERVICE_PORT}
        VITE_CART_SERVICE_URL: http://${EC2_PUBLIC_IP}:${CART_SERVICE_PORT}
        VITE_ORDER_SERVICE_URL: http://${EC2_PUBLIC_IP}:${ORDER_SERVICE_PORT}
        VITE_PAYMENT_SERVICE_URL: http://${EC2_PUBLIC_IP}:${PAYMENT_SERVICE_PORT}
    ports:
      - "${HTTP_PORT}:80"
    depends_on:
      - user-service
      - cart-service
      - order-service
      - payment-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge